<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Bred Developer | Fullstack Developer</title>

  <meta name="description"
    content="Bred Developer Portfolio - Modern Fullstack Developer specializing in Vue JS, Golang, PostgreSQL, and modern 3D web experiences." />

  <meta name="keywords"
    content="Fullstack Developer, Vue JS, Golang, PostgreSQL, Web Developer, Portfolio, 3D Website" />

  <meta name="author" content="Bred Developer" />

  <!-- THEME -->
  <meta name="theme-color" content="#0b1020" />

  <!-- OPEN GRAPH -->
  <meta property="og:title" content="Bred Developer Portfolio" />
  <meta property="og:description" content="Modern Fullstack Developer Portfolio with interactive 3D experience." />
  <meta property="og:image" content="/assets/profile.jpg" />
  <meta property="og:type" content="website" />

  <!-- ICON -->
  <link rel="icon" type="image/jpg" href="/assets/profile.jpg" />

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- BOOTSTRAP ICONS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- SPLINE -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.57/build/spline-viewer.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 100, 0.08), transparent 25%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.08), transparent 25%),
        #050816;
      color: #e5e7eb;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -2;
      opacity: 0.3;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(0, 255, 100, 0.08);
      filter: blur(120px);
      top: -150px;
      right: -150px;
      z-index: -1;
    }

    #app {
      position: relative;
      z-index: 1;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #070b18;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00ff88, #0084ff);
      border-radius: 999px;
    }

    ::selection {
      background: rgba(0, 255, 136, 0.35);
      color: white;
    }

    a {
      text-decoration: none;
    }

    /* Loading Fade */
    body {
      animation: appFade 1s ease;
    }

    @keyframes appFade {
      from {
        opacity: 0;
        transform: scale(1.01);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Spline global fix */
    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Mobile Optimization */
    @media (max-width: 768px) {
      body::after {
        width: 250px;
        height: 250px;
      }

      html,
      body {
        overflow-x: hidden;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
