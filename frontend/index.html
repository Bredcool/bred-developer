  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left,
          rgba(0, 255, 136, .08),
          transparent 25%),
        radial-gradient(circle at bottom right,
          rgba(0, 140, 255, .08),
          transparent 25%),
        #050816;

      color: #e5e7eb;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;

      background-image:
        linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);

      background-size: 40px 40px;
      z-index: -2;
      opacity: .25;
    }

    body::after {
      content: "";
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;

      background: rgba(0, 255, 136, .08);
      filter: blur(120px);

      top: -150px;
      right: -150px;

      z-index: -1;
    }

    #app {
      position: relative;
      z-index: 1;
    }

    ::selection {
      background: rgba(0, 255, 136, .35);
      color: white;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0b1020;
    }

    ::-webkit-scrollbar-thumb {
      background:
        linear-gradient(180deg,
          #00ff88,
          #00c3ff);
      border-radius: 999px;
    }

    a {
      text-decoration: none;
    }

    body {
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(1.01);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width:768px) {

      body::after {
        width: 250px;
        height: 250px;
      }

      html,
      body {
        overflow-x: hidden;
      }
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script type="module" src="/src/main.ts"></script>

</body>
